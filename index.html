<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🍬 消消乐 | 计时冲关版</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #1f2b3c, #0e1a2a);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Fredoka One', system-ui, sans-serif;
            padding: 16px;
        }

        /* 主游戏面板 */
        .game-wrapper {
            max-width: 650px;
            width: 100%;
            background: rgba(255, 245, 225, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 72px;
            padding: 20px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.4), inset 0 1px 1px rgba(255,255,255,0.3);
        }

        .game-card {
            background: #fffaf2;
            border-radius: 56px;
            padding: 20px 20px 24px;
            box-shadow: 0 12px 25px rgba(0,0,0,0.2);
        }

        /* 状态栏：得分 + 关卡 + 时间 */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .stat {
            background: #5e3c2a;
            border-radius: 60px;
            padding: 8px 20px;
            color: #ffefdc;
            font-weight: bold;
            box-shadow: inset 0 -2px 0 #3a261a, 0 6px 12px rgba(0,0,0,0.2);
            flex: 1;
            text-align: center;
            min-width: 100px;
        }

        .stat-label {
            font-size: 0.75rem;
            letter-spacing: 1px;
            opacity: 0.85;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1.2;
        }

        .target-box {
            background: #f4a261;
            color: #2d1c0f;
        }
        .target-box .stat-value {
            font-size: 1.3rem;
        }

        /* 洗牌与重置按钮组 */
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .btn {
            flex: 1;
            background: #ffb347;
            border: none;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 12px 0;
            border-radius: 50px;
            color: #2d2b1f;
            cursor: pointer;
            transition: transform 0.1s ease, background 0.2s;
            box-shadow: 0 5px 0 #b4621a;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #b4621a;
        }

        .btn.reset {
            background: #5c7c6e;
            color: white;
            box-shadow: 0 5px 0 #2e4a3e;
        }

        /* 游戏网格 */
        .grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            background: #f7e5cf;
            border-radius: 40px;
            gap: 6px;
            padding: 18px;
            box-shadow: inset 0 0 0 2px white, 0 8px 20px rgba(0,0,0,0.25);
        }

        .cell {
            aspect-ratio: 1 / 1;
            background: linear-gradient(145deg, #ffefd6, #ffe2bc);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.1rem;
            cursor: pointer;
            transition: all 0.08s linear;
            box-shadow: 0 5px 0 #c29a6b;
            transform: translateY(-2px);
        }

        .cell.selected {
            background: #ffcc88;
            box-shadow: 0 0 0 3px white, 0 0 0 6px #ffaa44;
            transform: scale(0.97);
        }

        .cell:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #c29a6b;
        }

        /* 消除动画临时类 */
        .cell-eliminate {
            animation: pop 0.2s ease-in-out;
        }

        @keyframes pop {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); background: gold; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 结束蒙层 */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }

        .overlay.show {
            visibility: visible;
            opacity: 1;
        }

        .modal {
            background: #fff2e3;
            border-radius: 56px;
            padding: 32px 24px;
            text-align: center;
            width: 280px;
            box-shadow: 0 20px 35px black;
        }

        .modal h2 {
            margin: 0 0 12px;
            font-size: 2rem;
        }

        .modal button {
            background: #ffa047;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 10px 30px;
            border-radius: 40px;
            margin-top: 20px;
            cursor: pointer;
        }

        .footer-note {
            text-align: center;
            margin-top: 18px;
            font-size: 0.75rem;
            color: #ffefcf;
            font-weight: 500;
            text-shadow: 1px 1px 0 #1e2e3a;
        }

        @media (max-width: 550px) {
            .grid { gap: 4px; padding: 12px; }
            .cell { font-size: 1.5rem; border-radius: 14px; }
            .stat-value { font-size: 1.3rem; }
            .btn { font-size: 0.9rem; padding: 8px 0; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-card">
        <div class="stats-bar">
            <div class="stat">
                <div class="stat-label">🍬 总分</div>
                <div class="stat-value" id="totalScore">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">⭐ 关卡</div>
                <div class="stat-value" id="levelNum">1</div>
            </div>
            <div class="stat target-box">
                <div class="stat-label">🎯 目标分</div>
                <div class="stat-value" id="targetScore">200</div>
            </div>
            <div class="stat" style="background:#2f6b47;">
                <div class="stat-label">⏱️ 剩余时间</div>
                <div class="stat-value" id="timerDisplay">60</div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn" id="shuffleBtn">🃏 洗牌 & 重置计时</button>
            <button class="btn reset" id="resetGameBtn">🔄 新的一局</button>
        </div>

        <div class="grid" id="gameGrid"></div>
    </div>
    <div class="footer-note">
        ✨ 相邻交换消除三个以上 → 冲关！ 时间耗尽则失败 ✨
    </div>
</div>

<!-- 游戏结束弹窗 -->
<div id="gameOverlay" class="overlay">
    <div class="modal">
        <h2 id="overlayTitle">⏰ 时间用完了</h2>
        <p id="overlayMsg">别灰心，重新开始挑战吧~</p>
        <button id="restartFromOverlay">再来一局</button>
    </div>
</div>

<script>
    // ---------- 游戏配置 ----------
    const ROWS = 8;
    const COLS = 8;
    const TILE_TYPES = 6;
    const EMOJIS = ["🍎", "🍊", "🍒", "🍓", "🍉", "🍋"];

    // 关卡基础时间（秒），每关减少5秒，最低25秒
    const BASE_TIME = 60;
    const MIN_TIME = 25;

    // 关卡目标分公式：关卡 * 200 (第一关200分，第二关400分，以此类推)
    function getTargetForLevel(level) {
        return level * 200;
    }

    // 根据关卡获取时间上限
    function getTimeForLevel(level) {
        let time = BASE_TIME - (level - 1) * 5;
        return Math.max(MIN_TIME, time);
    }

    // 全局变量
    let grid = [];              // 二维数组 0~TILE_TYPES-1
    let totalScore = 0;        // 累计总分（跨关卡）
    let currentLevel = 1;
    let targetScore = getTargetForLevel(1);
    let timeLeft = getTimeForLevel(1);
    let timerInterval = null;
    let gameActive = true;      // 游戏是否进行中（未结束/未过关暂停）
    let processing = false;     // 防止消除动画/交换时点击
    let selectedRow = -1, selectedCol = -1;

    // DOM 元素
    const gridContainer = document.getElementById("gameGrid");
    const totalScoreSpan = document.getElementById("totalScore");
    const levelSpan = document.getElementById("levelNum");
    const targetSpan = document.getElementById("targetScore");
    const timerDisplaySpan = document.getElementById("timerDisplay");
    const shuffleBtn = document.getElementById("shuffleBtn");
    const resetBtn = document.getElementById("resetGameBtn");
    const overlay = document.getElementById("gameOverlay");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayMsg = document.getElementById("overlayMsg");
    const restartOverlayBtn = document.getElementById("restartFromOverlay");

    // ---------- 辅助函数 ----------
    function updateUI() {
        totalScoreSpan.innerText = totalScore;
        levelSpan.innerText = currentLevel;
        targetSpan.innerText = targetScore;
        timerDisplaySpan.innerText = timeLeft;
    }

    // 停止计时器
    function stopTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
    }

    // 开始计时（基于当前timeLeft）
    function startTimer() {
        if (timerInterval) stopTimer();
        if (!gameActive) return;
        timerInterval = setInterval(() => {
            if (!gameActive || processing) return;  // 动画中不计时减少（避免动画时时间归零误判）
            if (timeLeft <= 1) {
                // 时间到，游戏结束
                timeLeft = 0;
                updateUI();
                gameOver(false);
            } else {
                timeLeft--;
                updateUI();
            }
        }, 1000);
    }

    // 游戏结束 (胜利/失败)
    function gameOver(isWin) {
        if (!gameActive) return;
        gameActive = false;
        stopTimer();
        if (isWin) {
            overlayTitle.innerText = "🎉 恭喜通关！ 🎉";
            overlayMsg.innerText = `你完成了第 ${currentLevel} 关！总分 ${totalScore}`;
        } else {
            overlayTitle.innerText = "⏰ 时间用完了";
            overlayMsg.innerText = `闯关失败～ 重新开局吧！`;
        }
        overlay.classList.add("show");
    }

    // 重置所有数据（全新开始）
    function fullReset() {
        stopTimer();
        // 重置全局状态
        totalScore = 0;
        currentLevel = 1;
        targetScore = getTargetForLevel(1);
        timeLeft = getTimeForLevel(1);
        gameActive = true;
        processing = false;
        selectedRow = -1;
        selectedCol = -1;
        // 初始化棋盘并消除稳定
        initRandomGrid();
        stabilizeBoardSync();   // 消除初始连击
        renderGrid();
        updateUI();
        startTimer();
    }

    // 洗牌动作：重排当前棋盘（不清分，不改变关卡，但重置计时器）
    function reshuffleAndResetTimer() {
        if (!gameActive) return;
        if (processing) return;
        processing = true;
        // 打乱所有格子
        for (let i = 0; i < ROWS; i++) {
            for (let j = 0; j < COLS; j++) {
                grid[i][j] = Math.floor(Math.random() * TILE_TYPES);
            }
        }
        // 保证洗牌后至少有一步可走，否则递归一次
        if (!hasAnyValidMove()) {
            // 再洗一次
            for (let i = 0; i < ROWS; i++) {
                for (let j = 0; j < COLS; j++) {
                    grid[i][j] = Math.floor(Math.random() * TILE_TYPES);
                }
            }
        }
        // 重置选中
        clearSelected();
        renderGrid();
        // 稳定棋盘（消除现有的匹配）
        settleMatchesAndDropLoop(false).then(() => {
            renderGrid();
            // 关键：重置计时器到当前关卡的最大时间
            stopTimer();
            timeLeft = getTimeForLevel(currentLevel);
            updateUI();
            if (gameActive) startTimer();
            processing = false;
        }).catch(() => { processing = false; });
    }

    // ---------- 核心消除逻辑 ----------
    function initRandomGrid() {
        let newGrid = [];
        for (let i = 0; i < ROWS; i++) {
            newGrid[i] = [];
            for (let j = 0; j < COLS; j++) {
                newGrid[i][j] = Math.floor(Math.random() * TILE_TYPES);
            }
        }
        grid = newGrid;
    }

    // 同步消除+重力+补新，直到稳定（不带动画，直接修改grid）
    function stabilizeBoardSync() {
        let changed = true;
        while (changed) {
            const toEliminate = getAllMatches(grid);
            if (toEliminate.size === 0) break;
            for (let key of toEliminate) {
                const [r, c] = key.split(',').map(Number);
                grid[r][c] = -1;
            }
            applyGravityAndRefill();
        }
    }

    // 异步消除链（带动画效果）
    async function settleMatchesAndDropLoop(shouldAddScore = true) {
        let anyElim = false;
        while (true) {
            const matches = getAllMatches(grid);
            if (matches.size === 0) break;
            anyElim = true;
            if (shouldAddScore) {
                const addPoints = matches.size * 10;
                totalScore += addPoints;
                updateUI();
                // 通关检测
                if (totalScore >= targetScore && gameActive) {
                    // 过关升级！
                    await levelUp();
                    // 升级后棋盘已刷新，继续循环可能会再次消除，但return后可重新进入稳定
                    return;
                }
            }
            // 消除动画（为每个格子添加特效）
            for (let key of matches) {
                const [r,c] = key.split(',').map(Number);
                grid[r][c] = -1;
                const cellDiv = document.querySelector(`.cell[data-row='${r}'][data-col='${c}']`);
                if (cellDiv) cellDiv.classList.add('cell-eliminate');
            }
            renderGrid();
            await delay(130);
            applyGravityAndRefill();
            renderGrid();
            await delay(80);
        }
        if (anyElim && shouldAddScore) {
            // 额外检查一次是否因为总分更新而满足通关（保险）
            if (totalScore >= targetScore && gameActive) {
                await levelUp();
            }
        }
    }

    // 关卡升级
    async function levelUp() {
        if (!gameActive) return;
        // 阻止操作以免冲突
        processing = true;
        stopTimer();
        currentLevel++;
        targetScore = getTargetForLevel(currentLevel);
        timeLeft = getTimeForLevel(currentLevel);
        updateUI();
        // 重新生成一个干净的棋盘（新关卡重置棋盘更公平）
        initRandomGrid();
        stabilizeBoardSync();
        renderGrid();
        // 确保新棋盘有可行移动
        if (!hasAnyValidMove()) {
            // 轻微洗牌
            for (let i=0;i<ROWS;i++)
                for(let j=0;j<COLS;j++)
                    if(Math.random()<0.3) grid[i][j] = Math.floor(Math.random() * TILE_TYPES);
            stabilizeBoardSync();
            renderGrid();
        }
        clearSelected();
        // 显示升级提示（临时）
        showTip(`⭐ 恭喜进入第 ${currentLevel} 关！目标 ${targetScore} 分 ⭐`);
        gameActive = true;
        processing = false;
        startTimer();
    }

    function showTip(msg) {
        let tip = document.createElement("div");
        tip.innerText = msg;
        tip.style.position = "fixed";
        tip.style.bottom = "35%";
        tip.style.left = "50%";
        tip.style.transform = "translateX(-50%)";
        tip.style.backgroundColor = "#ffd966";
        tip.style.color = "#3b2a1f";
        tip.style.padding = "8px 20px";
        tip.style.borderRadius = "40px";
        tip.style.fontWeight = "bold";
        tip.style.zIndex = "999";
        tip.style.fontSize = "1rem";
        tip.style.boxShadow = "0 4px 12px black";
        document.body.appendChild(tip);
        setTimeout(() => tip.remove(), 1800);
    }

    function applyGravityAndRefill() {
        for (let c = 0; c < COLS; c++) {
            let columnValues = [];
            for (let r = ROWS-1; r >=0; r--) {
                if (grid[r][c] !== -1) columnValues.push(grid[r][c]);
            }
            while (columnValues.length < ROWS) {
                columnValues.push(Math.floor(Math.random() * TILE_TYPES));
            }
            columnValues.reverse();
            for (let r = 0; r < ROWS; r++) grid[r][c] = columnValues[r];
        }
    }

    function getAllMatches(board) {
        const toClear = new Set();
        // 水平
        for (let r=0; r<ROWS; r++) {
            let len=1;
            for (let c=1; c<=COLS; c++) {
                if (c<COLS && board[r][c] !== -1 && board[r][c] === board[r][c-1]) len++;
                else {
                    if (len>=3) {
                        for (let i=c-len; i<c; i++) toClear.add(`${r},${i}`);
                    }
                    len=1;
                }
            }
        }
        // 垂直
        for (let c=0; c<COLS; c++) {
            let len=1;
            for (let r=1; r<=ROWS; r++) {
                if (r<ROWS && board[r][c] !== -1 && board[r][c] === board[r-1][c]) len++;
                else {
                    if (len>=3) {
                        for (let i=r-len; i<r; i++) toClear.add(`${i},${c}`);
                    }
                    len=1;
                }
            }
        }
        return toClear;
    }

    function hasAnyValidMove() {
        for (let r=0; r<ROWS; r++) {
            for (let c=0; c<COLS; c++) {
                if (c+1<COLS) {
                    swapGrid(r,c, r,c+1);
                    let has = getAllMatches(grid).size > 0;
                    swapGrid(r,c, r,c+1);
                    if (has) return true;
                }
                if (r+1<ROWS) {
                    swapGrid(r,c, r+1,c);
                    let has = getAllMatches(grid).size > 0;
                    swapGrid(r,c, r+1,c);
                    if (has) return true;
                }
            }
        }
        return false;
    }

    function swapGrid(r1,c1, r2,c2) {
        let t = grid[r1][c1];
        grid[r1][c1] = grid[r2][c2];
        grid[r2][c2] = t;
    }

    function clearSelected() {
        selectedRow = -1;
        selectedCol = -1;
        renderGrid();
    }

    async function trySwapAndMatch(r1,c1, r2,c2) {
        if (!gameActive || processing) return false;
        processing = true;
        swapGrid(r1,c1, r2,c2);
        renderGrid();
        await delay(70);
        const matches = getAllMatches(grid);
        if (matches.size > 0) {
            // 有效交换
            await settleMatchesAndDropLoop(true);
            renderGrid();
            // 检查无步数自动洗牌
            if (!hasAnyValidMove() && gameActive) {
                showTip("🤔 无有效步数，自动洗牌并重置计时");
                await reshuffleAndResetTimerLogic();
            }
            processing = false;
            return true;
        } else {
            swapGrid(r1,c1, r2,c2);
            renderGrid();
            await delay(80);
            processing = false;
            return false;
        }
    }

    async function reshuffleAndResetTimerLogic() {
        if (!gameActive) return;
        processing = true;
        for (let i=0;i<ROWS;i++) {
            for (let j=0;j<COLS;j++) {
                grid[i][j] = Math.floor(Math.random() * TILE_TYPES);
            }
        }
        if (!hasAnyValidMove()) {
            for (let i=0;i<ROWS;i++)
                for(let j=0;j<COLS;j++)
                    grid[i][j] = Math.floor(Math.random() * TILE_TYPES);
        }
        clearSelected();
        renderGrid();
        await settleMatchesAndDropLoop(true);
        renderGrid();
        stopTimer();
        timeLeft = getTimeForLevel(currentLevel);
        updateUI();
        if (gameActive) startTimer();
        processing = false;
    }

    function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

    // ---------- 交互事件 ----------
    function onCellClick(row, col) {
        if (!gameActive || processing) return;
        if (selectedRow === -1) {
            selectedRow = row; selectedCol = col;
            renderGrid();
            return;
        }
        const isAdjacent = (Math.abs(selectedRow - row) + Math.abs(selectedCol - col)) === 1;
        if (!isAdjacent) {
            selectedRow = row; selectedCol = col;
            renderGrid();
            return;
        }
        const r1=selectedRow, c1=selectedCol, r2=row, c2=col;
        clearSelected(); // 清除高亮
        trySwapAndMatch(r1,c1, r2,c2).catch(e=>console.warn);
    }

    function renderGrid() {
        gridContainer.innerHTML = "";
        for (let i=0; i<ROWS; i++) {
            for (let j=0; j<COLS; j++) {
                let val = grid[i][j];
                let emoji = (val>=0 && val<TILE_TYPES) ? EMOJIS[val] : "🍬";
                let cell = document.createElement("div");
                cell.className = "cell";
                if (selectedRow === i && selectedCol === j) cell.classList.add("selected");
                cell.textContent = emoji;
                cell.setAttribute("data-row", i);
                cell.setAttribute("data-col", j);
                cell.addEventListener("click", (function(r,c){ return ()=>onCellClick(r,c); })(i,j));
                gridContainer.appendChild(cell);
            }
        }
    }

    // 手动洗牌（带重置计时）
    function manualShuffle() {
        if (!gameActive || processing) return;
        reshuffleAndResetTimerLogic();
    }

    // 初始化游戏
    function initGame() {
        totalScore = 0;
        currentLevel = 1;
        targetScore = getTargetForLevel(1);
        timeLeft = getTimeForLevel(1);
        gameActive = true;
        processing = false;
        selectedRow = -1;
        initRandomGrid();
        stabilizeBoardSync();
        renderGrid();
        updateUI();
        stopTimer();
        startTimer();
    }

    // 事件绑定
    shuffleBtn.addEventListener("click", () => manualShuffle());
    resetBtn.addEventListener("click", () => {
        if (processing) return;
        stopTimer();
        initGame();
    });
    restartOverlayBtn.addEventListener("click", () => {
        overlay.classList.remove("show");
        initGame();
    });

    initGame();
</script>
</body>
</html>
